    <script type="application/ld+json">

          "Adjustable playback speed",

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is slowed + reverb?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A remix style where a track is slowed down and washed in reverb, giving it a hazy, underwater, nostalgic feel. This editor lets you dial in the speed, pitch, reverb and bass yourself and hear the result change live, instead of downloading someone else's fixed version."
            }
          },
          {
            "@type": "Question",
            "name": "Does this upload my audio anywhere?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No — everything runs locally in your browser. There's no server, no upload queue and no account; the file you drop in never leaves your device."
            }
          },
          {
            "@type": "Question",
            "name": "Can I slow a song down without making it sound lower / chipmunked?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Slowing playback down naturally drops the pitch too — that's the classic tape-style slowed sound — but the pitch fader runs independently of speed, so you can nudge it back up to keep the pitch you started with, or push it further for a more dramatic effect."
            }
          },
          {
            "@type": "Question",
            "name": "What's the difference between slowed + reverb, daycore and nightcore?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nightcore speeds a track up and raises the pitch for a brighter, more energetic feel. Daycore and slowed + reverb both slow it down and drop the pitch; slowed + reverb adds a heavy reverb wash on top for that hazy, spaced-out texture, while daycore usually stays drier."
            }
          },
          {
            "@type": "Question",
            "name": "What audio formats are supported?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Drop in mp3, wav, m4a or flac. Export the result as a lossless WAV or a 192 kbps MP3."
            }
          },
          {
            "@type": "Question",
            "name": "Can I use this on my phone?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — it's a normal web page built on the Web Audio API, so it runs in modern mobile browsers the same way it does on desktop, no app install required."
            }
          },
          {
            "@type": "Question",
            "name": "Is the export lossless?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "WAV export is lossless 16-bit PCM. MP3 export is compressed at 192 kbps if you'd rather have a smaller file."
            }
          }
        ]
      }
    </script>
